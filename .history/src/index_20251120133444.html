<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spots</title>

    <link rel="icon" type="image/x-icon" href="./images/favicon.ico" />
  </head>

  <body class="page">
    <header class="header">
      <img src="./images/Logo.svg" alt="Spots logo" class="header__logo" />
    </header>

    <main class="content">
      <!-- Profile -->

    <!-- Profile -->
<section class="profile page__section">

  <img
    src="#"
    alt="User avatar"
    class="profile__avatar"
  />

  <div class="profile__column">
    <h1 class="profile__name">Placeholder name</h1>
    <p class="profile__description">Placeholder description</p>

    <button
      type="button"
      class="profile__edit-btn"
      aria-controls="edit-profile-modal"
    >
      <img src="./images/pencil-icon.svg" alt="" aria-hidden="true" />
      Edit Profile
    </button>
  </div>

  <button
    type="button"
    class="profile__add-btn"
    aria-controls="new-post-modal"
  >
    <img src="./images/plus-icon.svg" alt="" aria-hidden="true" />
    New Post
  </button>

</section>


<!-- New Post Modal -->
    <div
      class="modal"
      id="new-post-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="new-post-title"
    >
      <div class="modal__container modal__container_type_new-post">
        <button class="modal__close-button" type="button" aria-label="Close">
          <img class="modal__close-icon" src="./images/close-icon.png" alt="" />
        </button>

        <form class="modal__form" novalidate>
          <h2 class="modal__title" id="new-post-title">New post</h2>

          <label class="modal__label" for="new-post-title-input">
            Title
            <input
              id="new-post-title-input"
              type="text"
              class="modal__input"
              placeholder="Title"
              autocomplete="off"
              required
              minlength="2"
              maxlength="30"
              aria-describedby="new-post-title-input-error"
            />
            <span
              class="modal__error"
              id="new-post-title-input-error"
              aria-live="polite"
              aria-atomic="true"
            ></span>
          </label>

          <label class="modal__label" for="new-post-url-input">
            Image URL
            <input
              id="new-post-url-input"
              type="url"
              class="modal__input"
              placeholder="Image URL"
              inputmode="url"
              autocomplete="off"
              required
              aria-describedby="new-post-url-input-error"
            />
            <span
              class="modal__error"
              id="new-post-url-input-error"
              aria-live="polite"
              aria-atomic="true"
            ></span>
          </label>

          <button type="submit" class="modal__submit-button" disabled>
            Create
          </button>
        </form>
      </div>
    </div>

    <!-- Image Preview Modal -->
    <div
      class="modal"
      id="image-preview-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="image-preview-title"
    >
      <div class="modal__container modal__container_type_image">
        <button class="modal__close-button" type="button" aria-label="Close">
          <img class="modal__close-icon" src="./images/close-icon.png" alt="" />
        </button>

        <figure class="modal__figure">
          <img class="modal__image" src="#" alt="Preview image" />
          <figcaption
            class="modal__caption"
            id="image-preview-title"
          ></figcaption>
        </figure>
      </div>
    </div>

    <!-- Edit Avatar Modal -->
    <div
      class="modal"
      id="edit-avatar-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="edit-avatar-title"
    >
      <div class="modal__container">
        <button class="modal__close-button" type="button" aria-label="Close">
          <img class="modal__close-icon" src="./images/close-icon.png" alt="" />
        </button>

        <form class="modal__form" novalidate>
          <h2 class="modal__title" id="edit-avatar-title">
            Change profile picture
          </h2>

          <label for="avatar-url-input" class="modal__label">
            Avatar URL
            <input
              id="avatar-url-input"
              type="url"
              class="modal__input"
              placeholder="Image link"
              required
              aria-describedby="avatar-url-input-error"
            />
            <span
              class="modal__error"
              id="avatar-url-input-error"
              aria-live="polite"
              aria-atomic="true"
            ></span>
          </label>

          <button type="submit" class="modal__submit-button">Save</button>
        </form>
      </div>
    </div>
  </body>
</html>
